services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3x-ui
    restart: unless-stopped
    volumes:
      - ./3x-ui-db:/etc/x-ui/
    environment:
      - TZ=Asia/Shanghai
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      
      # --- 1. TCP Router: Xray REALITY Stealth Passthrough ---
      - "traefik.tcp.routers.xray-reality.rule=HostSNI(`www.microsoft.com`)" 
      - "traefik.tcp.routers.xray-reality.entrypoints=websecure"
      - "traefik.tcp.routers.xray-reality.tls.passthrough=true"
      - "traefik.tcp.services.xray-reality.loadbalancer.server.port=4433"

      # --- 2. HTTP Router: 3x-ui Web Panel via Custom URL ---
      - "traefik.http.routers.xui-panel.rule=Host(`sub.domain.com`)" # Change to your domain
      - "traefik.http.routers.xui-panel.entrypoints=websecure"
      - "traefik.http.routers.xui-panel.tls=true"
      - "traefik.http.routers.xui-panel.tls.certresolver=cloudflare"
      - "traefik.http.services.xui-panel.loadbalancer.server.port=2053"

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # You must generate an API Token in Cloudflare (Permissions: Zone -> DNS -> Edit)
      - CF_DNS_API_TOKEN=your_cloudflare_api_token_here # Change this
    command:
      - "--api.insecure=false" # Disabled for security; you can enable it behind a secure route if needed
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      
      # Enable the dynamic configuration file
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      
      # Let's Encrypt Cloudflare DNS-01 Challenge Configuration
      - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.email=your_email@example.com" # Change this
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro # Mounts the dynamic config
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge